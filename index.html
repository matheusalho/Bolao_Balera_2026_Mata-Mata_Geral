<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolão BALERA — Mata-Mata 2026 · Ranking</title>
<style>
:root{--azul:#1e3a8a;--ciano:#00b4ff;--ouro:#D4AF37;--amarelo:#ffeb00;--tinta:#0b1220;--cinza:#566170;--linha:#0000001a;--bg:#eef3f7}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--tinta);background:linear-gradient(#00b4ff1f,#0000 380px),var(--bg);min-height:100vh}
header.top{background:#000;color:#fff;display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:14px clamp(12px,3vw,28px);position:sticky;top:0;z-index:20;box-shadow:0 2px 10px #0003}
header.top .brand{display:flex;align-items:center;gap:10px;background:#000;border:1px solid #ffffff22;border-radius:8px;padding:6px 12px}
header.top img{height:34px;width:auto;display:block}
header.top h1{font-size:1rem;margin:0;font-weight:800;letter-spacing:.02em}
header.top .sub{color:var(--ciano);font-size:.72rem;font-weight:900;text-transform:uppercase}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;background:#ffffff14;padding:6px;border-radius:10px}
.tabs button{background:transparent;color:#cbd5e1;border:0;border-radius:7px;padding:8px 14px;font-weight:800;font-size:.82rem;cursor:pointer}
.tabs button.active{background:var(--ciano);color:#000}
.wrap{max-width:1200px;margin:22px auto;padding:0 clamp(12px,3vw,24px)}
.card{background:#fff;border:1px solid var(--linha);border-radius:12px;box-shadow:0 10px 30px #0000000f;overflow:hidden}
.card .hd{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:16px 18px;border-bottom:1px solid var(--linha)}
.card .hd h2{margin:0;font-size:1.3rem}
.muted{color:var(--cinza);font-size:.85rem;font-weight:600}
.search{min-height:38px;border:1px solid #00000026;border-radius:7px;padding:0 12px;font:inherit;min-width:220px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:center;font-size:.86rem;border-bottom:1px solid #00000010}
th{background:#0b1220;color:#fff;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
.tablewrap{max-height:72vh;overflow:auto}
td.nome,th.nome{text-align:left;font-weight:700}
tbody tr:nth-child(odd){background:#fbfdff}
tbody tr:hover{background:#00b4ff12;cursor:pointer}
.rankpos{font-weight:900;color:var(--azul)}
.pill{display:inline-block;border-radius:999px;padding:2px 9px;font-size:.74rem;font-weight:800}
.pill.tot{background:var(--azul);color:#fff}
.badge{border-radius:5px;padding:2px 7px;font-size:.66rem;font-weight:900}
.b-brasil{background:var(--ciano);color:#000}
.b-prov{background:#ffe4e6;color:#9f1239}
.empty{padding:48px 18px;text-align:center;color:var(--cinza)}
.btn{background:#000;color:#fff;border:0;border-radius:7px;padding:10px 16px;font-weight:800;cursor:pointer}
.btn.ouro{background:var(--ouro);color:#000}
.btn.ciano{background:var(--ciano);color:#000}
.btn:hover{filter:brightness(1.08)}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;padding:18px}
.game{border:1px solid var(--linha);border-radius:10px;overflow:hidden}
.game.brasil{box-shadow:0 0 0 2px #ffeb0066}
.game .gh{display:flex;justify-content:space-between;align-items:center;background:#f7fafc;border-bottom:1px solid var(--linha);padding:7px 12px;font-size:.7rem;font-weight:900;color:var(--cinza)}
.gnum{background:var(--amarelo);color:#000;border-radius:4px;padding:2px 7px}
.gscore{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:12px}
.tn{font-weight:800;font-size:.92rem}
.tn.h{text-align:right}
.sc{display:flex;gap:6px;align-items:center}
.sc input{width:42px;text-align:center;font-weight:900;font-size:1.05rem;min-height:38px;border:1px solid #00000026;border-radius:6px}
.sx{color:#94a3b8;font-weight:900}
.scorers{border-top:1px dashed var(--linha);padding:10px 12px;display:grid;gap:8px;background:#00b4ff08}
.scol h4{margin:0 0 4px;font-size:.66rem;text-transform:uppercase;color:#1f2933}
.srow{display:grid;grid-template-columns:22px 1fr;gap:8px;align-items:center;margin-bottom:5px}
.sidx{background:var(--ciano);color:#000;border-radius:50%;width:20px;height:20px;display:grid;place-items:center;font-size:.7rem;font-weight:900}
.srow select{min-height:34px;border:1px solid #00000026;border-radius:6px;font:inherit;padding:0 8px}
.rules{padding:20px;display:grid;gap:14px;max-width:760px}
.rule{border:1px solid var(--linha);border-radius:10px;padding:14px 16px}
.rule h3{margin:0 0 4px;font-size:1rem}
.rule .pts{float:right;font-weight:900;color:var(--azul)}
.uploadzone{padding:40px 18px;text-align:center}
.uploadzone input{display:none}
.modal-bg{position:fixed;inset:0;background:#000000a8;display:grid;place-items:center;padding:18px;z-index:40}
.modal{background:#fff;border-radius:12px;max-width:760px;width:100%;max-height:88vh;overflow:auto;padding:22px}
.modal h3{margin:0 0 12px}
.bk{font-size:.8rem}
.bk td{text-align:center}
.bk td.g{text-align:left;font-weight:700}
.tag-pos{background:#e0f2fe;color:#075985;border-radius:4px;padding:1px 6px;font-size:.66rem;font-weight:800;margin-left:6px}
.note{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#92400e;margin:0 18px 14px}
.hd-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn.ghost{background:#fff;color:var(--azul);border:1px solid #cbd5e1;font-weight:800}
.btn.ghost:hover{background:var(--azul);color:#fff;filter:none}
td.rankpos{white-space:nowrap;font-weight:900}
tbody tr.p1 td:first-child{box-shadow:inset 5px 0 0 #D4AF37}
tbody tr.p2 td:first-child{box-shadow:inset 5px 0 0 #9aa6b2}
tbody tr.p3 td:first-child{box-shadow:inset 5px 0 0 #cd7f32}
tbody tr.p1 .pill.tot{background:#D4AF37;color:#1a1300}
.spinner{width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:var(--ciano);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loadingdot{color:var(--ciano);font-weight:800}
@media(max-width:700px){.tabs{width:100%;margin-left:0}.games{grid-template-columns:1fr}th{position:static}.hd-actions{width:100%}.hd-actions .search{flex:1}}
</style>
</head>
<body>
<header class="top">
  <div class="brand">
    <img src="https://i0.wp.com/dev.balera.com.br/wp-content/uploads/2024/09/balera_home_icon.webp?resize=90%2C115&ssl=1" alt="Balera" onerror="this.style.display='none'"/>
    <div><div class="sub">Bolão Copa 2026</div><h1>Mata-Mata · Ranking</h1></div>
  </div>
  <nav class="tabs" id="tabs">
    <button data-tab="ranking" class="active">Ranking Atualizado</button>
    <button data-tab="jogos">Jogos e Resultados</button>
    <button data-tab="regras">Regras</button>
    <button data-tab="carregar">Carregar Palpites</button>
  </nav>
</header>
<div class="wrap" id="view"></div>

<script src="./dados-mm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="./config.js"></script>
<script src="./app.js"></script>
</body>
</html>
